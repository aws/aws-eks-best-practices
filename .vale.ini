StylesPath = vale/styles

Packages = RedHat, AsciiDoc, https://github.com/Open-Paws/vale-no-animal-violence/releases/latest/download/NoAnimalViolence.zip

# Ignore files in dirs starting with `.` to avoid raising errors for `.vale/fixtures/*/testinvalid.adoc` files
[[\!.]*.adoc]
BasedOnStyles = RedHat, AsciiDoc, BpgDocs, NoAnimalViolence
RedHat.GitLinks = OFF 
AsciiDoc.UnsetAttributes = OFF 
RedHat.CaseSensitiveTerms = suggestion
RedHat.TermsErrors = warning
RedHat.Spacing = warning
